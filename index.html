<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工單看板</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222535;
    --border: #2e3347;
    --text: #e8eaf2;
    --text-dim: #7c82a0;
    --todo: #4a6cf7;
    --todo-bg: rgba(74,108,247,0.12);
    --doing: #f7a94a;
    --doing-bg: rgba(247,169,74,0.12);
    --review: #a94af7;
    --review-bg: rgba(169,74,247,0.12);
    --done: #4af7a0;
    --done-bg: rgba(74,247,160,0.12);
    --drag-over: rgba(255,255,255,0.06);
    --radius: 12px;
    --card-radius: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    overflow-x: auto;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 1;
    padding: 28px 32px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid var(--border);
  }

  header .logo {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  header h1 {
    font-size: 20px;
    font-weight: 500;
    letter-spacing: -0.3px;
  }

  header .tag-count {
    margin-left: auto;
    display: flex;
    gap: 12px;
    font-size: 12px;
    color: var(--text-dim);
  }

  .board-wrapper {
    position: relative;
    z-index: 1;
    display: flex;
    gap: 16px;
    padding: 24px 32px 32px;
    min-height: calc(100vh - 80px);
    align-items: flex-start;
  }

  .column {
    width: 280px;
    flex-shrink: 0;
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    max-height: calc(100vh - 120px);
    transition: border-color 0.2s;
  }

  .column.drag-over {
    border-color: var(--done);
    background: var(--drag-over);
  }

  .col-header {
    padding: 16px 16px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .col-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .col-title {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.3px;
  }

  .col-count {
    margin-left: auto;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    background: var(--surface2);
    padding: 2px 7px;
    border-radius: 20px;
  }

  /* Column color themes */
  .col-todo .col-dot { background: var(--todo); }
  .col-todo .col-title { color: var(--todo); }
  .col-doing .col-dot { background: var(--doing); }
  .col-doing .col-title { color: var(--doing); }
  .col-review .col-dot { background: var(--review); }
  .col-review .col-title { color: var(--review); }
  .col-done .col-dot { background: var(--done); }
  .col-done .col-title { color: var(--done); }

  .col-todo { border-top: 2px solid var(--todo); }
  .col-doing { border-top: 2px solid var(--doing); }
  .col-review { border-top: 2px solid var(--review); }
  .col-done { border-top: 2px solid var(--done); }

  .cards-list {
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    overflow-y: auto;
    flex: 1;
    min-height: 80px;
  }

  .cards-list::-webkit-scrollbar { width: 4px; }
  .cards-list::-webkit-scrollbar-track { background: transparent; }
  .cards-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    padding: 12px 14px;
    cursor: grab;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s, border-color 0.15s;
    user-select: none;
    animation: cardIn 0.25s ease;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card:active { cursor: grabbing; }

  .card:hover {
    border-color: #3e4460;
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }

  .card.dragging {
    opacity: 0.4;
    transform: scale(0.97);
  }

  .card-id {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }

  .card-title {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.5;
    margin-bottom: 10px;
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 500;
    letter-spacing: 0.3px;
  }

  .priority-high { background: rgba(247,74,74,0.18); color: #f74a4a; }
  .priority-mid  { background: rgba(247,169,74,0.18); color: var(--doing); }
  .priority-low  { background: rgba(74,247,160,0.18); color: var(--done); }

  .type-badge {
    background: var(--surface);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }

  .card-assignee {
    margin-left: auto;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: linear-gradient(135deg, #4a6cf7, #a94af7);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
  }

  /* Done column special style */
  .col-done .card {
    opacity: 0.75;
  }
  .col-done .card:hover { opacity: 1; }

  .done-check {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    color: var(--done);
  }

  /* Add card button */
  .add-card-btn {
    margin: 0 12px 12px;
    padding: 8px;
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: var(--card-radius);
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans TC', sans-serif;
    width: calc(100% - 24px);
  }

  .add-card-btn:hover {
    border-color: #3e4460;
    color: var(--text);
    background: var(--surface2);
  }

  /* Empty placeholder */
  .empty-placeholder {
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
    padding: 20px 12px;
    opacity: 0.6;
    display: none;
  }
  .cards-list:empty + .empty-placeholder,
  .cards-list.is-empty + .empty-placeholder { display: block; }

  /* Drag ghost indicator */
  .drop-indicator {
    height: 3px;
    background: var(--done);
    border-radius: 2px;
    margin: 2px 0;
    display: none;
    animation: pulse 1s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  /* Toast notification */
  .toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--surface2);
    border: 1px solid var(--done);
    color: var(--done);
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    z-index: 9999;
    animation: toastIn 0.3s ease, toastOut 0.3s ease 1.8s forwards;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  @keyframes toastIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  @keyframes toastOut { to{opacity:0;transform:translateY(10px)} }

  /* Responsive */
  @media (max-width: 768px) {
    .board-wrapper { padding: 16px; }
    .column { width: 260px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">KANBAN</div>
  <h1>工單看板</h1>
  <div class="tag-count" id="globalCount"></div>
</header>

<div class="board-wrapper">

  <!-- 待處理 -->
  <div class="column col-todo" id="col-todo" data-col="todo">
    <div class="col-header">
      <div class="col-dot"></div>
      <span class="col-title">待處理</span>
      <span class="col-count" id="count-todo">0</span>
    </div>
    <div class="cards-list" id="list-todo"></div>
    <p class="empty-placeholder">尚無工單</p>
    <button class="add-card-btn" onclick="addCard('todo')">＋ 新增工單</button>
  </div>

  <!-- 進行中 -->
  <div class="column col-doing" id="col-doing" data-col="doing">
    <div class="col-header">
      <div class="col-dot"></div>
      <span class="col-title">進行中</span>
      <span class="col-count" id="count-doing">0</span>
    </div>
    <div class="cards-list" id="list-doing"></div>
    <p class="empty-placeholder">尚無工單</p>
    <button class="add-card-btn" onclick="addCard('doing')">＋ 新增工單</button>
  </div>

  <!-- 待審核 -->
  <div class="column col-review" id="col-review" data-col="review">
    <div class="col-header">
      <div class="col-dot"></div>
      <span class="col-title">待審核</span>
      <span class="col-count" id="count-review">0</span>
    </div>
    <div class="cards-list" id="list-review"></div>
    <p class="empty-placeholder">尚無工單</p>
    <button class="add-card-btn" onclick="addCard('review')">＋ 新增工單</button>
  </div>

  <!-- 已完成 ✨ NEW -->
  <div class="column col-done" id="col-done" data-col="done">
    <div class="col-header">
      <div class="col-dot"></div>
      <span class="col-title">已完成</span>
      <span class="col-count" id="count-done">0</span>
    </div>
    <div class="cards-list" id="list-done"></div>
    <p class="empty-placeholder">完成工單後拖曳至此</p>
  </div>

</div>

<script>
// ─── Data ───────────────────────────────────────────────────────
let cards = [
  { id:'TK-001', title:'修復登入頁面 CSS 跑版問題', col:'todo', priority:'high', type:'Bug', assignee:'李' },
  { id:'TK-002', title:'新增使用者角色管理功能', col:'todo', priority:'mid', type:'功能', assignee:'王' },
  { id:'TK-003', title:'整合第三方金流 API', col:'doing', priority:'high', type:'功能', assignee:'陳' },
  { id:'TK-004', title:'優化資料庫查詢效能', col:'doing', priority:'mid', type:'優化', assignee:'張' },
  { id:'TK-005', title:'撰寫 API 文件', col:'review', priority:'low', type:'文件', assignee:'林' },
  { id:'TK-006', title:'更新首頁設計稿', col:'review', priority:'mid', type:'設計', assignee:'吳' },
  { id:'TK-007', title:'修復 Email 發送失敗問題', col:'done', priority:'high', type:'Bug', assignee:'黃' },
];

let dragSrc = null;
let cardCounter = 8;

// ─── Render ─────────────────────────────────────────────────────
function render() {
  const cols = ['todo','doing','review','done'];
  cols.forEach(col => {
    const list = document.getElementById('list-' + col);
    const count = document.getElementById('count-' + col);
    const colCards = cards.filter(c => c.col === col);

    list.innerHTML = '';
    colCards.forEach(card => {
      list.appendChild(makeCard(card));
    });

    count.textContent = colCards.length;
    list.classList.toggle('is-empty', colCards.length === 0);
  });

  // Global stats
  const total = cards.length;
  const done = cards.filter(c => c.col === 'done').length;
  document.getElementById('globalCount').innerHTML =
    `<span>共 ${total} 張工單</span><span style="color:var(--done)">✓ ${done} 已完成</span>`;
}

function makeCard(data) {
  const div = document.createElement('div');
  div.className = 'card';
  div.draggable = true;
  div.dataset.id = data.id;

  const priorityMap = { high:'priority-high', mid:'priority-mid', low:'priority-low' };
  const priorityLabel = { high:'高優先', mid:'中優先', low:'低優先' };
  const isDone = data.col === 'done';

  div.innerHTML = `
    <div class="card-id">${data.id}</div>
    <div class="card-title">${isDone ? `<span class="done-check">✓</span> ` : ''}${data.title}</div>
    <div class="card-meta">
      <span class="badge ${priorityMap[data.priority]}">${priorityLabel[data.priority]}</span>
      <span class="badge type-badge">${data.type}</span>
      <div class="card-assignee" title="${data.assignee}">${data.assignee}</div>
    </div>
  `;

  // Drag events
  div.addEventListener('dragstart', e => {
    dragSrc = data.id;
    setTimeout(() => div.classList.add('dragging'), 0);
    e.dataTransfer.effectAllowed = 'move';
  });
  div.addEventListener('dragend', () => {
    div.classList.remove('dragging');
    dragSrc = null;
    document.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));
  });

  return div;
}

// ─── Column drop targets ─────────────────────────────────────────
document.querySelectorAll('.column').forEach(col => {
  col.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    col.classList.add('drag-over');
  });
  col.addEventListener('dragleave', e => {
    if (!col.contains(e.relatedTarget)) col.classList.remove('drag-over');
  });
  col.addEventListener('drop', e => {
    e.preventDefault();
    col.classList.remove('drag-over');
    if (!dragSrc) return;

    const targetCol = col.dataset.col;
    const card = cards.find(c => c.id === dragSrc);
    if (!card || card.col === targetCol) return;

    const prevCol = card.col;
    card.col = targetCol;
    render();

    if (targetCol === 'done') {
      showToast(`✓ ${card.id} 已移至「已完成」`);
    }
  });
});

// ─── Add card ───────────────────────────────────────────────────
function addCard(col) {
  const title = prompt('請輸入工單標題：');
  if (!title || !title.trim()) return;

  const id = 'TK-' + String(cardCounter++).padStart(3,'0');
  cards.push({ id, title: title.trim(), col, priority:'mid', type:'任務', assignee:'我' });
  render();
}

// ─── Toast ──────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2200);
}

// ─── Init ───────────────────────────────────────────────────────
render();
</script>
</body>
</html>
